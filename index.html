<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Music AO — A tua música, o teu dinheiro</title>
<meta name="description" content="A plataforma angolana de streaming e monetização musical. Cada play paga ao artista, em kwanzas, com transparência total.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0B0B0F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Music AO">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230B0B0F'/><path d='M30 70V32l14 22 14-22v38' stroke='%23E0122C' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/><circle cx='74' cy='36' r='7' fill='%23F2B01E'/></svg>">
</head>
<body>

<div class="app">

  <!-- ===== Sidebar (desktop) / topbar (mobile) ===== -->
  <aside class="sidebar" id="sidebar">
    <a class="brand" href="#/home" aria-label="Music AO — início">
      <svg viewBox="0 0 100 100" class="brand-mark" aria-hidden="true">
        <path d="M30 70V32l14 22 14-22v38" stroke="var(--red)" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="74" cy="36" r="7" fill="var(--gold)"/>
      </svg>
      <span class="brand-name">MUSIC<em>AO</em></span>
    </a>

    <nav class="nav" aria-label="Navegação principal">
      <a href="#/home"      data-route="home"><span class="nav-ico">◉</span> Início</a>
      <a href="#/explorar"  data-route="explorar"><span class="nav-ico">▤</span> Explorar</a>
      <a href="#/pesquisa"  data-route="pesquisa"><span class="nav-ico">⌕</span> Pesquisar</a>
      <a href="#/biblioteca" data-route="biblioteca"><span class="nav-ico">♥</span> Biblioteca</a>
      <a href="#/videos"    data-route="videos"><span class="nav-ico">🎬</span> Canal de Vídeos</a>
      <a href="#/wallet"    data-route="wallet"><span class="nav-ico">▣</span> Carteira</a>
      <a href="#/upload"    data-route="upload"    data-role="artista"><span class="nav-ico">▲</span> Publicar</a>
      <a href="#/dashboard" data-route="dashboard" data-role="artista"><span class="nav-ico">◫</span> Meu painel</a>
      <a href="#/admin"     data-route="admin"     data-role="admin"><span class="nav-ico">⛭</span> Administração</a>
      <a href="#/lancamentos" data-route="lancamentos" data-role="admin"><span class="nav-ico">◐</span> Lançamentos</a>
      <a href="#/distribuicao" data-route="distribuicao" data-role="admin"><span class="nav-ico">◎</span> Distribuição</a>
      <a href="#/pagamentos" data-route="pagamentos" data-role="admin"><span class="nav-ico">◈</span> Pagamentos PSX</a>
    </nav>

    <div class="sidebar-foot">
      <div class="role-switch" role="group" aria-label="Modo de demonstração — perfil">
        <span class="role-label">Demo — perfil</span>
        <div class="role-btns">
          <button data-setrole="ouvinte" class="active">Ouvinte</button>
          <button data-setrole="artista">Artista</button>
          <button data-setrole="admin">Admin</button>
        </div>
      </div>
      <div class="wallet-chip" id="walletChip" title="Saldo da carteira">
        <span class="wallet-dot"></span>
        <span id="walletBalance">—</span>
      </div>
    </div>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main" id="main" tabindex="-1"></main>

  <!-- ===== Player persistente ===== -->
  <footer class="player" id="player" hidden>
    <div class="player-track">
      <div class="player-cover" id="pCover"></div>
      <div class="player-meta">
        <div class="player-title" id="pTitle">—</div>
        <div class="player-artist" id="pArtist">—</div>
      </div>
      <div class="eq" id="eq" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
    </div>

    <div class="player-center">
      <div class="player-controls">
        <button id="btnPrev" aria-label="Anterior"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
        <button id="btnPlay" class="btn-play" aria-label="Reproduzir / pausar">
          <svg class="ic-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="ic-pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" hidden><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
        </button>
        <button id="btnNext" aria-label="Seguinte"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 6h2v12h-2zM6 6v12l8.5-6z"/></svg></button>
      </div>
      <div class="player-progress">
        <span id="pTime">0:00</span>
        <div class="bar" id="pBar"><div class="bar-fill" id="pFill"></div></div>
        <span id="pDur">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <div class="paid-ticker" id="paidTicker" title="Consumo de dados">
        <span class="tick-label">qualidade</span>
        <span class="tick-value" id="tickValue">Normal</span>
      </div>
      <button id="btnDl" class="btn-dl" title="Comprar download">⭳ 100 Kz</button>
      <button id="btnFull" class="btn-full" title="Ecrã inteiro" aria-label="Ecrã inteiro">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      </button>
    </div>
  </footer>

  <!-- ===== Leitor em ecrã inteiro ===== -->
  <div class="fs-player" id="fsPlayer" hidden>
    <div class="fs-bg" id="fsBg"></div>
    <button class="fs-close" id="fsClose" aria-label="Fechar ecrã inteiro">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6"/><path d="M20 10h-6V4"/><path d="M14 10 21 3"/><path d="M3 21l7-7"/></svg>
    </button>
    <div class="fs-inner">
      <div class="fs-cover" id="fsCover"></div>
      <div class="fs-title" id="fsTitle">—</div>
      <a class="fs-artist" id="fsArtist" href="#">—</a>
      <div class="fs-progress">
        <span id="fsTime">0:00</span>
        <div class="fs-bar" id="fsBar"><div class="fs-fill" id="fsFill"></div></div>
        <span id="fsDur">0:00</span>
      </div>
      <div class="fs-controls">
        <button id="fsShuffle" class="fs-sec" title="Aleatório" aria-label="Aleatório">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>
        </button>
        <button id="fsPrev" class="fs-sec" title="Anterior" aria-label="Anterior">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button id="fsPlay" class="fs-play" title="Reproduzir / pausar" aria-label="Reproduzir / pausar">
          <svg class="ic-play" viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="ic-pause" viewBox="0 0 24 24" width="32" height="32" fill="currentColor" hidden><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
        </button>
        <button id="fsNext" class="fs-sec" title="Seguinte" aria-label="Seguinte">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor"><path d="M16 6h2v12h-2zM6 6v12l8.5-6z"/></svg>
        </button>
        <button id="fsRepeat" class="fs-sec" title="Repetir" aria-label="Repetir">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
      <div class="fs-actions">
        <button id="fsFav" class="fs-act">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1.1-1a5.5 5.5 0 0 0-7.8 7.8l1.1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
          <span>Favoritar</span>
        </button>
        <button id="fsDl" class="fs-act">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          <span>Baixar</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== Bottom nav (mobile) ===== -->
  <nav class="bottomnav" aria-label="Navegação móvel">
    <a href="#/home" data-route="home">◉<span>Início</span></a>
    <a href="#/explorar" data-route="explorar">▤<span>Explorar</span></a>
    <a href="#/pesquisa" data-route="pesquisa">⌕<span>Pesquisa</span></a>
    <a href="#/wallet" data-route="wallet">▣<span>Carteira</span></a>
  </nav>
</div>

<!-- ===== Modal genérico ===== -->
<div class="modal-backdrop" id="modal" hidden>
  <div class="modal" role="dialog" aria-modal="true" id="modalBox"></div>
</div>

<!-- ===== Toasts ===== -->
<div class="toasts" id="toasts" aria-live="polite"></div>

<!-- ===== Suporte WhatsApp (flutuante) ===== -->
<a class="wa-fab" id="waSupport" href="https://wa.me/244924958103?text=Ol%C3%A1%20Music%20AO%2C%20preciso%20de%20ajuda" target="_blank" rel="noopener" title="Falar com o suporte no WhatsApp" aria-label="Suporte WhatsApp">
  <span class="wa-ico">✆</span>
  <span class="wa-label">Suporte</span>
</a>

<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/app.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
</body>
</html>
